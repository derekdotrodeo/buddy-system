server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # No TLS here — the Cloudflare Tunnel terminates HTTPS upstream and proxies to http://web:80.

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml;

    # Hashed, content-addressed assets — safe to cache forever.
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Clean URLs from Astro's build.format: 'directory'. Keep in sync with astro.config.
    # This is a static multi-page site (not an SPA): unknown paths must 404, not fall
    # back to the homepage — so use =404 and let error_page serve the custom page.
    location / {
        try_files $uri $uri/ $uri.html =404;
        add_header Cache-Control "no-cache";
    }

    error_page 404 /404.html;
}
