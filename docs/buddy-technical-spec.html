  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

off2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'IBM Plex Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"244086a7-861c-4432-a56b-22f3f1d0226a\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'IBM Plex Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"4965691e-1afb-48e0-a9ee-d8d3b99bc24e\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'IBM Plex Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"cfb4f44c-70a7-4426-a22c-24e25e2d98e8\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* cyrillic-ext */\n@font-face {\n  font-family: 'IBM Plex Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"5191f6f7-3f35-4544-92b4-6f5c75daa834\") format('woff2');\n  unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* cyrillic */\n@font-face {\n  font-family: 'IBM Plex Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"63eda4f9-6ffa-41da-90da-84c9d02ace46\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'IBM Plex Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"2daa35c0-7cd7-4fa5-8cdf-ab12c6e66026\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'IBM Plex Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"85d6f068-e6ab-41a9-a6a3-96781c3ebe5b\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'IBM Plex Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"f262253d-c00a-4ebc-bc6a-c3956894103e\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  /* ---- the pitch: 0.1in breadboard spacing. 1P = 10px on screen ---- */\n  --p: 10px;\n  --p-half: 5px;\n\n  /* ---- surfaces ---- */\n  --ink: #17181b;        /* matte black soldermask */\n  --ink-2: #232527;      /* raised black (cards on ink) */\n  --ink-3: #313438;      /* hairlines on ink */\n  --paper: #f4f3ee;      /* breadboard ABS white, warm-neutral */\n  --paper-2: #eceae3;    /* recessed paper */\n  --paper-3: #dcd9cf;    /* hairlines on paper */\n  --silk: #ffffff;       /* silkscreen white */\n  --ink-soft: #5b5e63;   /* secondary text on paper */\n  --silk-soft: #9a9da3;  /* secondary text on ink */\n  --copper: #c29a4d;     /* exposed pad gold — reserved, sparing */\n\n  /* ---- rails (reserved meanings, never decorative) ---- */\n  --rail-pos: oklch(0.62 0.18 28);   /* +V  red  */\n  --rail-neg: oklch(0.58 0.12 252);  /* GND blue */\n\n  /* ---- family hues: color is wiring, not decoration ---- */\n  --fam-ctl: oklch(0.70 0.17 50);    /* CTL · Control   · orange */\n  --fam-snd: oklch(0.86 0.17 98);    /* SND · Sound     · yellow */\n  --fam-dat: oklch(0.70 0.15 155);   /* DAT · Data      · green  */\n  --fam-lgc: oklch(0.67 0.13 240);   /* LGC · Logic     · blue   */\n  --fam-uty: oklch(0.67 0.13 305);   /* UTY · Utility   · violet */\n  --fam-pwr: oklch(0.62 0.18 28);    /* PWR · Power     · red (= rail) */\n\n  /* ---- type ---- */\n  --font-sans: 'Barlow', 'DIN 2014', sans-serif;\n  --font-cond: 'Barlow Semi Condensed', 'DIN 2014', sans-serif;\n  --font-mono: 'IBM Plex Mono', monospace;\n\n  /* ---- shape ---- */\n  --r: 6px;            /* default corner radius (tweakable) */\n  --r-sm: 3px;\n  --bw: 2px;           /* silkscreen stroke weight */\n}\n\n/* ============================================================\n   DOT GRIDS — the breadboard texture\n   ============================================================ */\n.dots-dark {\n  background-image: radial-gradient(circle at center, var(--ink-3) 1.6px, transparent 1.7px);\n  background-size: var(--p) var(--p);\n}\n.dots-light {\n  background-image: radial-gradient(circle at center, var(--paper-3) 1.6px, transparent 1.7px);\n  background-size: var(--p) var(--p);\n}\n\n/* ============================================================\n   RAILS — paired red/blue lines, edges + footers only\n   ============================================================ */\n.rails {\n  height: calc(var(--p) * 1.4);\n  background:\n    linear-gradient(var(--rail-pos), var(--rail-pos)) 0 2px / 100% 3px no-repeat,\n    linear-gradient(var(--rail-neg), var(--rail-neg)) 0 9px / 100% 3px no-repeat;\n}\n\n/* ============================================================\n   PLATE — the boxed-label wordmark + naming component\n   <span class=\"plate\"><span class=\"cell fill\">BUDDY<\u002Fspan><span class=\"cell\">SYSTEM<\u002Fspan><\u002Fspan>\n   Inherits currentColor for the frame; .fill inverts.\n   ============================================================ */\n.plate {\n  display: inline-flex;\n  align-items: stretch;\n  border: var(--bw) solid currentColor;\n  border-radius: var(--r-sm);\n  overflow: hidden;\n  font-family: var(--font-cond);\n  font-weight: 700;\n  text-transform: uppercase;\n  letter-spacing: 0.06em;\n  line-height: 1;\n  white-space: nowrap;\n}\n.plate .cell {\n  padding: 0.42em 0.6em 0.36em;\n  display: inline-flex;\n  align-items: center;\n}\n.plate .cell + .cell { border-left: var(--bw) solid currentColor; }\n.plate .cell.fill {\n  background: currentColor;\n}\n/* explicit inversion: the surface class sets the filled cell's text color */\n.on-ink   { --plate-fill-text: var(--ink); }\n.on-paper { --plate-fill-text: var(--paper); }\n.plate .cell.fill > span { color: var(--plate-fill-text, var(--paper)); }\n\n/* ============================================================\n   CHIP — family designator tag\n   <span class=\"chip\" style=\"--fam: var(--fam-snd)\">SND<\u002Fspan>\n   ============================================================ */\n.chip {\n  display: inline-flex;\n  align-items: center;\n  gap: 0.5em;\n  font-family: var(--font-mono);\n  font-weight: 600;\n  font-size: 0.78em;\n  letter-spacing: 0.08em;\n  padding: 0.3em 0.65em;\n  border-radius: var(--r-sm);\n  background: var(--fam, var(--ink-3));\n  color: var(--ink);\n}\n\n/* ============================================================\n   MONO CAPTION — figure labels, refdes, pin names\n   ============================================================ */\n.mcap {\n  font-family: var(--font-mono);\n  font-size: 11px;\n  letter-spacing: 0.04em;\n  color: var(--ink-soft);\n}\n.mcap-ink { color: var(--silk-soft); }\n\n/* ============================================================\n   JUMPER — colored wire arc divider (pure CSS)\n   <div class=\"jumper\" style=\"--fam: var(--fam-dat)\"><\u002Fdiv>\n   ============================================================ */\n.jumper {\n  height: calc(var(--p) * 2);\n  position: relative;\n}\n.jumper::before {\n  content: '';\n  position: absolute;\n  left: 0; right: 0; top: 50%;\n  height: calc(var(--p) * 3);\n  transform: translateY(-50%);\n  border-top: 3px solid var(--fam, var(--fam-ctl));\n  border-radius: 50% 50% 0 0 / 100% 100% 0 0;\n}\n.jumper::after {\n  content: '';\n  position: absolute;\n  top: 50%;\n  left: -4px; right: -4px;\n  height: 0;\n}\n\n/* wire endpoints */\n.jumper i {\n  position: absolute;\n  width: 8px; height: 8px;\n  border-radius: 2px;\n  background: var(--fam, var(--fam-ctl));\n  top: calc(50% - var(--p) * 1.5 + -1px);\n}\n.jumper i:first-child { left: 0; }\n.jumper i:last-child { right: 0; }\n<\u002Fstyle>\n<style>/* ============================================================\n   BUDDY SYSTEM — technical specification document styles\n   US Letter pages, print-ready. Requires tokens.css.\n   ============================================================ */\n\n* { margin: 0; padding: 0; box-sizing: border-box; }\nbody {\n  font-family: var(--font-sans);\n  background: var(--ink);\n  color: var(--ink);\n  padding: calc(var(--p) * 5) 0;\n}\n.desk {\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  gap: calc(var(--p) * 4);\n}\n\n/* ---------- page ---------- */\n.page {\n  width: 816px;\n  min-height: 1056px;\n  background: var(--paper);\n  border-radius: 3px;\n  box-shadow: 0 18px 50px rgba(0,0,0,0.45);\n  padding: 56px 64px 40px;\n  display: flex;\n  flex-direction: column;\n  position: relative;\n}\n\n/* ---------- page chrome: ruler head, rails foot ---------- */\n.page-head {\n  display: flex;\n  justify-content: space-between;\n  align-items: baseline;\n  font-family: var(--font-mono);\n  font-size: 9.5px;\n  letter-spacing: 0.08em;\n  color: var(--ink-soft);\n  border-bottom: 1px solid var(--paper-3);\n  padding-bottom: 8px;\n  margin-bottom: calc(var(--p) * 3.5);\n}\n.page-head .ruler-run { display: flex; gap: calc(var(--p) * 4); }\n.page-foot { margin-top: auto; padding-top: calc(var(--p) * 2.5); }\n.page-foot .rails { margin-bottom: 8px; }\n.page-foot .folio {\n  display: flex;\n  justify-content: space-between;\n  font-family: var(--font-mono);\n  font-size: 9.5px;\n  letter-spacing: 0.1em;\n  color: var(--ink-soft);\n}\n\n/* ---------- title block ---------- */\n.titleblock { display: flex; flex-direction: column; gap: calc(var(--p) * 2); margin-bottom: calc(var(--p) * 3); }\n.titleblock .plate.brand { font-size: 15px; align-self: flex-start; }\n.titleblock h1 {\n  font-family: var(--font-cond);\n  font-weight: 800;\n  font-size: 54px;\n  line-height: 0.97;\n  text-transform: uppercase;\n  max-width: 14ch;\n}\n.spec-meta {\n  display: grid;\n  grid-template-columns: repeat(4, auto);\n  gap: calc(var(--p) * 3);\n  justify-content: start;\n  font-family: var(--font-mono);\n  font-size: 10.5px;\n  letter-spacing: 0.06em;\n  color: var(--ink-soft);\n  border-top: 2px solid var(--ink);\n  border-bottom: 1px solid var(--paper-3);\n  padding: 10px 0;\n}\n.spec-meta b { display: block; color: var(--ink); font-weight: 600; font-size: 12px; margin-top: 2px; }\n\n/* ---------- sections ---------- */\nsection.s { margin-bottom: calc(var(--p) * 3.5); break-inside: avoid; }\n.s-head {\n  display: flex;\n  align-items: center;\n  gap: calc(var(--p) * 1.5);\n  margin-bottom: calc(var(--p) * 1.5);\n}\n.s-head .plate { font-size: 13px; }\n.s-head .tag {\n  margin-left: auto;\n  font-family: var(--font-mono);\n  font-size: 9px;\n  letter-spacing: 0.16em;\n  color: var(--ink-soft);\n}\n.s h3 {\n  font-family: var(--font-cond);\n  font-weight: 700;\n  font-size: 16px;\n  letter-spacing: 0.08em;\n  text-transform: uppercase;\n  margin: calc(var(--p) * 2) 0 calc(var(--p) * 0.8);\n}\n.s h3 .snum { color: var(--ink-soft); font-weight: 600; margin-right: 8px; }\n.s p {\n  font-size: 13.5px;\n  line-height: 1.6;\n  color: #33363a;\n  max-width: 62ch;\n  text-wrap: pretty;\n  margin-bottom: calc(var(--p) * 1);\n}\n.s ul { margin: 0 0 var(--p) 0; padding-left: 0; list-style: none; }\n.s ul li {\n  font-size: 13.5px;\n  line-height: 1.55;\n  color: #33363a;\n  padding: 3px 0 3px 18px;\n  position: relative;\n}\n.s ul li::before {\n  content: '';\n  position: absolute;\n  left: 2px; top: 10px;\n  width: 6px; height: 6px;\n  border-radius: 1px;\n  background: var(--ink);\n}\n.s code, .mono {\n  font-family: var(--font-mono);\n  font-size: 12px;\n}\n\n/* defined terms */\n.term {\n  display: grid;\n  grid-template-columns: 150px 1fr;\n  gap: calc(var(--p) * 2);\n  padding: calc(var(--p) * 1.6) 0;\n  border-bottom: 1px solid var(--paper-3);\n}\n.term:last-of-type { border-bottom: none; }\n.term .plate { font-size: 11px; align-self: start; justify-self: start; }\n.term p { margin-bottom: 4px; }\n.term ul { columns: 2; column-gap: calc(var(--p) * 3); margin-bottom: 0; }\n\n/* ---------- spec tables ---------- */\ntable.spec {\n  width: 100%;\n  border-collapse: collapse;\n  margin: calc(var(--p) * 0.5) 0 calc(var(--p) * 1.5);\n}\ntable.spec.half { width: 60%; }\ntable.spec th {\n  font-family: var(--font-cond);\n  font-weight: 700;\n  font-size: 11.5px;\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n  text-align: left;\n  border-bottom: 2px solid var(--ink);\n  padding: 0 16px 6px 0;\n}\ntable.spec td {\n  padding: 8px 16px 8px 0;\n  border-bottom: 1px solid var(--paper-3);\n  font-size: 13px;\n  vertical-align: middle;\n}\ntable.spec td.v { font-family: var(--font-mono); font-size: 12px; }\ntable.spec td .chip { font-size: 10px; }\n\n/* ---------- callouts ---------- */\n.callout {\n  border-top: 3px solid var(--fam, var(--fam-dat));\n  background: var(--paper-2);\n  border-radius: 0 0 var(--r-sm) var(--r-sm);\n  padding: calc(var(--p) * 1.3) calc(var(--p) * 1.6);\n  display: flex;\n  gap: calc(var(--p) * 1.2);\n  margin: calc(var(--p) * 1.5) 0;\n  break-inside: avoid;\n}\n.callout .chip { align-self: flex-start; flex-shrink: 0; }\n.callout p { font-size: 13px; line-height: 1.55; margin: 0; }\n\n/* ============================================================\n   TECHNICAL DRAWINGS\n   ============================================================ */\nfigure.draw {\n  border: 1px solid var(--paper-3);\n  border-radius: var(--r-sm);\n  padding: calc(var(--p) * 3) calc(var(--p) * 2) calc(var(--p) * 1.5);\n  margin: calc(var(--p) * 2) 0;\n  break-inside: avoid;\n  background: var(--paper);\n}\nfigure.draw .scene { position: relative; margin: 0 auto; }\nfigure.draw figcaption {\n  font-family: var(--font-mono);\n  font-size: 10px;\n  letter-spacing: 0.08em;\n  color: var(--ink-soft);\n  border-top: 1px solid var(--paper-3);\n  padding-top: 10px;\n  margin-top: calc(var(--p) * 2.5);\n  display: flex;\n  justify-content: space-between;\n  gap: var(--p);\n}\n\n/* outline rects */\n.o { position: absolute; border: 1.5px solid var(--ink); border-radius: 2px; }\n.o.thin { border-width: 1px; border-color: #6a6d72; }\n.o.dashed { border-style: dashed; border-width: 1px; border-color: #8a8d92; }\n.o .olabel {\n  position: absolute;\n  inset: 0;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  font-family: var(--font-mono);\n  font-size: 9.5px;\n  letter-spacing: 0.1em;\n  color: var(--ink-soft);\n  text-align: center;\n  line-height: 1.5;\n}\n.o .corner-num {\n  position: absolute;\n  top: 4px; left: 6px;\n  font-family: var(--font-cond);\n  font-weight: 700;\n  font-size: 13px;\n  color: var(--ink);\n}\n\n/* connectors */\n.conn {\n  position: absolute;\n  background: var(--ink);\n  border-radius: 1px;\n  display: flex;\n  align-items: center;\n  justify-content: space-evenly;\n}\n.conn i {\n  width: 3px; height: 3px;\n  background: var(--paper);\n  border-radius: 50%;\n}\n.conn i.p1 { background: var(--fam-dat); }\n\n/* mounting hole */\n.mh {\n  position: absolute;\n  width: 9px; height: 9px;\n  border: 1.5px solid var(--ink);\n  border-radius: 50%;\n  transform: translate(-50%, -50%);\n}\n\n/* dimension lines */\n.dim-h, .dim-v { position: absolute; }\n.dim-h { border-top: 1px solid #7a7d82; height: 0; }\n.dim-h::before, .dim-h::after {\n  content: '';\n  position: absolute;\n  width: 1px; height: 9px;\n  background: #7a7d82;\n  top: -4.5px;\n}\n.dim-h::before { left: 0; }\n.dim-h::after { right: 0; }\n.dim-h > span {\n  position: absolute;\n  left: 50%; top: 1px;\n  transform: translateX(-50%);\n  background: var(--paper);\n  padding: 0 5px;\n  font-family: var(--font-mono);\n  font-size: 9.5px;\n  letter-spacing: 0.04em;\n  color: var(--ink);\n  white-space: nowrap;\n}\n.dim-h.above > span { top: auto; bottom: 1px; }\n.dim-v { border-left: 1px solid #7a7d82; width: 0; }\n.dim-v::before, .dim-v::after {\n  content: '';\n  position: absolute;\n  width: 9px; height: 1px;\n  background: #7a7d82;\n  left: -4.5px;\n}\n.dim-v::before { top: 0; }\n.dim-v::after { bottom: 0; }\n.dim-v > span {\n  position: absolute;\n  top: 50%; left: 5px;\n  transform: translateY(-50%);\n  background: var(--paper);\n  padding: 2px 0;\n  font-family: var(--font-mono);\n  font-size: 9.5px;\n  letter-spacing: 0.04em;\n  color: var(--ink);\n  white-space: nowrap;\n}\n.dim-v.westside > span { left: auto; right: 5px; }\n\n/* origin axes */\n.axis {\n  position: absolute;\n  font-family: var(--font-mono);\n  font-size: 9px;\n  color: var(--fam-pwr);\n}\n.axis.x { border-top: 1.5px solid var(--fam-pwr); }\n.axis.x::after { content: ''; position: absolute; right: -1px; top: -4px; border: 3.5px solid transparent; border-left: 6px solid var(--fam-pwr); }\n.axis.x > span { position: absolute; right: -14px; top: -6px; }\n.axis.y { border-left: 1.5px solid var(--fam-pwr); }\n.axis.y::after { content: ''; position: absolute; top: -1px; left: -4px; border: 3.5px solid transparent; border-bottom: 6px solid var(--fam-pwr); }\n.axis.y > span { position: absolute; top: -16px; left: -3px; }\n\n/* free annotation */\n.ann {\n  position: absolute;\n  font-family: var(--font-mono);\n  font-size: 9.5px;\n  letter-spacing: 0.06em;\n  color: var(--ink-soft);\n  white-space: nowrap;\n}\n\n/* ---------- pinout diagram ---------- */\n.pinrow {\n  display: flex;\n  justify-content: center;\n  gap: calc(var(--p) * 2);\n  padding: calc(var(--p) * 1) 0 0;\n}\n.pincell {\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  gap: 8px;\n  width: 86px;\n}\n.pincell .pad {\n  width: 34px; height: 34px;\n  border: 2px solid var(--ink);\n  border-radius: 3px;\n  background: var(--paper-2);\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  font-family: var(--font-mono);\n  font-weight: 600;\n  font-size: 13px;\n  position: relative;\n}\n.pincell.first .pad { border-radius: 50% 3px 3px 3px; }\n.pincell.first .pad::after {\n  content: 'PIN 1';\n  position: absolute;\n  top: -18px;\n  font-size: 8px;\n  letter-spacing: 0.12em;\n  color: var(--ink-soft);\n}\n.pincell .signal {\n  font-family: var(--font-cond);\n  font-weight: 700;\n  font-size: 14px;\n  letter-spacing: 0.08em;\n  text-transform: uppercase;\n}\n.pincell .chip { font-size: 9px; }\n\n/* ---------- bus topology ---------- */\n.topo { position: relative; height: 230px; }\n.topo .slotbox {\n  position: absolute;\n  top: 18px;\n  width: 86px;\n  height: 64px;\n  border: 1.5px solid var(--ink);\n  border-radius: 2px;\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  justify-content: center;\n  gap: 2px;\n  background: var(--paper);\n}\n.topo .slotbox .sn { font-family: var(--font-cond); font-weight: 700; font-size: 14px; }\n.topo .slotbox .sl { font-family: var(--font-mono); font-size: 8.5px; letter-spacing: 0.1em; color: var(--ink-soft); }\n.topo .stub { position: absolute; width: 2px; background: var(--fam-dat); }\n.topo .busline { position: absolute; left: 24px; right: 24px; height: 3px; background: var(--fam-dat); border-radius: 2px; }\n.topo .buslabel {\n  position: absolute;\n  font-family: var(--font-mono);\n  font-size: 9.5px;\n  font-weight: 600;\n  letter-spacing: 0.1em;\n  color: var(--fam-dat);\n  background: var(--paper);\n  padding: 0 4px;\n}\n.topo .term {\n  position: absolute;\n  width: 46px; height: 40px;\n  border: 1.5px dashed var(--ink-soft);\n  border-radius: 2px;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  text-align: center;\n  font-family: var(--font-mono);\n  font-size: 8.5px;\n  letter-spacing: 0.06em;\n  color: var(--ink-soft);\n  line-height: 1.5;\n  background: var(--paper);\n}\n\n/* ---------- side view (clearance) ---------- */\n.sideview { position: relative; height: 190px; }\n.sideview .pcb {\n  position: absolute;\n  left: 120px; width: 360px;\n  top: 92px; height: 7px;\n  background: var(--ink);\n  border-radius: 1px;\n}\n.sideview .comp-top {\n  position: absolute;\n  left: 220px; width: 120px;\n  top: 36px; height: 56px;\n  border: 1.5px solid var(--ink);\n  border-bottom: none;\n  border-radius: 2px 2px 0 0;\n}\n.sideview .comp-bot {\n  position: absolute;\n  left: 300px; width: 90px;\n  top: 99px; height: 34px;\n  border: 1.5px solid var(--ink);\n  border-top: none;\n  border-radius: 0 0 2px 2px;\n  background: var(--paper-2);\n}\n\n/* ---------- revision table page + print ---------- */\n@media print {\n  body { background: none; padding: 0; }\n  .desk { gap: 0; display: block; }\n  .page {\n    width: auto;\n    min-height: 0;\n    box-shadow: none;\n    border-radius: 0;\n    padding: 0;\n    break-after: page;\n  }\n  .page:last-child { break-after: auto; }\n  .rails, .chip, .plate .cell.fill, .conn, .busline, .stub, .pcb, .keybar, .pad\n    { print-color-adjust: exact; -webkit-print-color-adjust: exact; }\n  table.spec tr, .term, .callout, figure.draw, section.s h3 { break-inside: avoid; }\n}\n@page { margin: 0.75in; }\n<\u002Fstyle>\n\n<\u002Fhead>\n<body class=\"on-paper\">\n<div class=\"desk\">\n\n  <!-- ================= PAGE 1 ================= -->\n  <div class=\"page\" data-screen-label=\"Spec p.1 — Purpose &amp; Terms\">\n    <div class=\"page-head\">\n      <span>BS-SPEC-100 · TECHNICAL SPECIFICATION<\u002Fspan>\n      <span class=\"ruler-run\"><span>1<\u002Fspan><span>5<\u002Fspan><span>10<\u002Fspan><span>15<\u002Fspan><span>20<\u002Fspan><span>25<\u002Fspan><\u002Fspan>\n      <span>V1.0 DRAFT<\u002Fspan>\n    <\u002Fdiv>\n\n    <div class=\"titleblock\">\n      <span class=\"plate brand\"><span class=\"cell fill\"><span>BUDDY<\u002Fspan><\u002Fspan><span class=\"cell\">SYSTEM<\u002Fspan><\u002Fspan>\n      <h1>Technical specification<\u002Fh1>\n      <div class=\"spec-meta\">\n        <span>DOCUMENT<b>BS-SPEC-100<\u002Fb><\u002Fspan>\n        <span>VERSION<b>1.0 DRAFT<\u002Fb><\u002Fspan>\n        <span>DATE<b>JUN 2026<\u002Fb><\u002Fspan>\n        <span>UNITS<b>MILLIMETERS<\u002Fb><\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <section class=\"s\">\n      <header class=\"s-head\">\n        <span class=\"plate\"><span class=\"cell fill\"><span>1<\u002Fspan><\u002Fspan><span class=\"cell\">PURPOSE<\u002Fspan><\u002Fspan>\n        <span class=\"tag\">NORMATIVE<\u002Fspan>\n      <\u002Fheader>\n      <p>This document defines the mechanical and electrical standards for the Buddy System platform.<\u002Fp>\n      <p>Buddy System is a Eurorack-compatible electronics and synthesizer prototyping platform consisting of a central Buddy Base and interchangeable Buddy Cards. The platform is designed to provide reusable infrastructure for digital synthesizer development, interactive electronics, and educational experimentation.<\u002Fp>\n      <p>Unless otherwise specified, all dimensions are in millimeters.<\u002Fp>\n    <\u002Fsection>\n\n    <section class=\"s\">\n      <header class=\"s-head\">\n        <span class=\"plate\"><span class=\"cell fill\"><span>2<\u002Fspan><\u002Fspan><span class=\"cell\">TERMINOLOGY<\u002Fspan><\u002Fspan>\n        <span class=\"tag\">NORMATIVE<\u002Fspan>\n      <\u002Fheader>\n\n      <div class=\"term\">\n        <span class=\"plate\"><span class=\"cell fill\"><span>BUDDY<\u002Fspan><\u002Fspan><span class=\"cell\">BASE<\u002Fspan><\u002Fspan>\n        <div>\n          <p>The primary Eurorack-compatible carrier board containing:<\u002Fp>\n          <ul>\n            <li>Buddy Card slots<\u002Fli>\n            <li>Power distribution<\u002Fli>\n            <li>Buddy Bus infrastructure<\u002Fli>\n            <li>Prototyping breadboard<\u002Fli>\n            <li>Utility circuitry<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"term\">\n        <span class=\"plate\"><span class=\"cell fill\"><span>BUDDY<\u002Fspan><\u002Fspan><span class=\"cell\">CARD<\u002Fspan><\u002Fspan>\n        <div>\n          <p>A plug-in expansion card providing reusable functionality such as:<\u002Fp>\n          <ul>\n            <li>Controls<\u002Fli>\n            <li>Indicators<\u002Fli>\n            <li>MIDI interfaces<\u002Fli>\n            <li>Audio interfaces<\u002Fli>\n            <li>Displays<\u002Fli>\n            <li>Communications<\u002Fli>\n            <li>Utility circuits<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"term\">\n        <span class=\"plate\"><span class=\"cell fill\"><span>BUDDY<\u002Fspan><\u002Fspan><span class=\"cell\">BUS<\u002Fspan><\u002Fspan>\n        <div>\n          <p>The shared electrical and mechanical interconnect system used between the Buddy Base and Buddy Cards.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <div class=\"page-foot\">\n      <div class=\"rails\"><\u002Fdiv>\n      <div class=\"folio\"><span>BUDDY SYSTEM · MECHANICAL + ELECTRICAL STANDARD<\u002Fspan><span>1 / 7<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ================= PAGE 2 ================= -->\n  <div class=\"page\" data-screen-label=\"Spec p.2 — Base Mechanical\">\n    <div class=\"page-head\">\n      <span>BS-SPEC-100 · TECHNICAL SPECIFICATION<\u002Fspan>\n      <span class=\"ruler-run\"><span>30<\u002Fspan><span>35<\u002Fspan><span>40<\u002Fspan><span>45<\u002Fspan><span>50<\u002Fspan><span>55<\u002Fspan><\u002Fspan>\n      <span>V1.0 DRAFT<\u002Fspan>\n    <\u002Fdiv>\n\n    <section class=\"s\">\n      <header class=\"s-head\">\n        <span class=\"plate\"><span class=\"cell fill\"><span>3<\u002Fspan><\u002Fspan><span class=\"cell\">MECHANICAL<\u002Fspan><\u002Fspan>\n        <span class=\"tag\">NORMATIVE<\u002Fspan>\n      <\u002Fheader>\n\n      <h3><span class=\"snum\">3.1<\u002Fspan>Buddy Base dimensions<\u002Fh3>\n      <p>The Buddy Base shall conform to standard Eurorack mechanical dimensions.<\u002Fp>\n      <table class=\"spec half\">\n        <thead><tr><th>Parameter<\u002Fth><th>Value<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td>Width<\u002Ftd><td class=\"v\">47 HP (238.76 mm)<\u002Ftd><\u002Ftr>\n          <tr><td>Height<\u002Ftd><td class=\"v\">3U (128.5 mm nominal)<\u002Ftd><\u002Ftr>\n          <tr><td>PCB thickness<\u002Ftd><td class=\"v\">2.0 mm<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n\n      <figure class=\"draw\">\n        <div class=\"scene\" style=\"width: 688px; height: 425px;\">\n          <!-- base outline: 238.76 × 128.5 mm @ 2.8 px/mm -->\n          <div class=\"o\" style=\"left: 0; top: 14px; width: 668px; height: 360px;\"><\u002Fdiv>\n\n          <!-- slot pitch dim (slot 1 center → slot 2 center) -->\n          <div class=\"dim-h above\" style=\"left: 61px; top: 8px; width: 109px;\"><span>39.0 TYP<\u002Fspan><\u002Fdiv>\n\n          <!-- six card slots: 38 × 64 mm on 39 mm pitch -->\n          <div class=\"o dashed\" style=\"left: 8px;   top: 36px; width: 106px; height: 179px;\"><span class=\"corner-num\">1<\u002Fspan><\u002Fdiv>\n          <div class=\"o dashed\" style=\"left: 117px; top: 36px; width: 106px; height: 179px;\"><span class=\"corner-num\">2<\u002Fspan><\u002Fdiv>\n          <div class=\"o dashed\" style=\"left: 226px; top: 36px; width: 106px; height: 179px;\"><span class=\"corner-num\">3<\u002Fspan><\u002Fdiv>\n          <div class=\"o dashed\" style=\"left: 335px; top: 36px; width: 106px; height: 179px;\"><span class=\"corner-num\">4<\u002Fspan><\u002Fdiv>\n          <div class=\"o dashed\" style=\"left: 444px; top: 36px; width: 106px; height: 179px;\"><span class=\"corner-num\">5<\u002Fspan><\u002Fdiv>\n          <div class=\"o dashed\" style=\"left: 553px; top: 36px; width: 106px; height: 179px;\"><span class=\"corner-num\">6<\u002Fspan><\u002Fdiv>\n          <div class=\"ann\" style=\"left: 8px; top: 222px;\">UPPER REGION — BUDDY CARD SLOTS, NUMBERED LEFT TO RIGHT<\u002Fdiv>\n\n          <!-- lower region -->\n          <div class=\"o thin\" style=\"left: 60px; top: 248px; width: 462px; height: 112px; border-bottom: none; border-radius: 2px 2px 0 0;\"><span class=\"olabel\">830-POINT SOLDERLESS BREADBOARD<\u002Fspan><\u002Fdiv>\n          <div class=\"o thin\" style=\"left: 540px; top: 248px; width: 116px; height: 50px;\"><span class=\"olabel\">POWER IN<br>USB-C / HDR<\u002Fspan><\u002Fdiv>\n          <div class=\"o thin\" style=\"left: 540px; top: 308px; width: 116px; height: 40px;\"><span class=\"olabel\">STATUS<\u002Fspan><\u002Fdiv>\n          <div class=\"o thin\" style=\"left: 8px; top: 248px; width: 44px; height: 100px;\"><span class=\"olabel\" style=\"writing-mode: vertical-rl;\">BUS BREAKOUT · TEST POINTS<\u002Fspan><\u002Fdiv>\n\n          <!-- overall dims -->\n          <div class=\"dim-h\" style=\"left: 0; top: 396px; width: 668px;\"><span>238.76 · 47 HP<\u002Fspan><\u002Fdiv>\n          <div class=\"dim-v\" style=\"left: 680px; top: 14px; height: 360px;\"><span>128.5 · 3U<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <figcaption><span>FIG 1 — BUDDY BASE, FRONT VIEW · FUNCTIONAL REGIONS PER §3.2–3.3<\u002Fspan><span>SCALE 2.8 PX/MM<\u002Fspan><\u002Ffigcaption>\n      <\u002Ffigure>\n\n      <h3><span class=\"snum\">3.2<\u002Fspan>Functional layout<\u002Fh3>\n      <p>The Buddy Base is divided into two primary regions. The <b>upper region<\u002Fb> is reserved for Buddy Card slots. The <b>lower region<\u002Fb> is reserved for the 830-point solderless breadboard, power distribution circuitry, status indicators, bus breakout headers, test points, and utility functions.<\u002Fp>\n      <p>The lower region shall provide sufficient space for a standard 830-point solderless breadboard.<\u002Fp>\n    <\u002Fsection>\n\n    <div class=\"page-foot\">\n      <div class=\"rails\"><\u002Fdiv>\n      <div class=\"folio\"><span>§3 · MECHANICAL SPECIFICATION<\u002Fspan><span>2 / 7<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ================= PAGE 3 ================= -->\n  <div class=\"page\" data-screen-label=\"Spec p.3 — Card Mechanical\">\n    <div class=\"page-head\">\n      <span>BS-SPEC-100 · TECHNICAL SPECIFICATION<\u002Fspan>\n      <span class=\"ruler-run\"><span>60<\u002Fspan><span>65<\u002Fspan><span>70<\u002Fspan><span>75<\u002Fspan><span>80<\u002Fspan><span>85<\u002Fspan><\u002Fspan>\n      <span>V1.0 DRAFT<\u002Fspan>\n    <\u002Fdiv>\n\n    <section class=\"s\">\n      <h3><span class=\"snum\">3.3<\u002Fspan>Slot arrangement<\u002Fh3>\n      <p>The Buddy Base shall provide six Buddy Card slots, numbered left to right <code>1 2 3 4 5 6<\u002Fcode>. Slot pitch shall be 39 mm center-to-center.<\u002Fp>\n\n      <h3><span class=\"snum\">3.4<\u002Fspan>Buddy Card dimensions<\u002Fh3>\n      <table class=\"spec half\">\n        <thead><tr><th>Parameter<\u002Fth><th>Value<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td>Width<\u002Ftd><td class=\"v\">38.0 mm ±0.2<\u002Ftd><\u002Ftr>\n          <tr><td>Height<\u002Ftd><td class=\"v\">64.0 mm<\u002Ftd><\u002Ftr>\n          <tr><td>PCB thickness<\u002Ftd><td class=\"v\">1.6 mm<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n\n      <figure class=\"draw\">\n        <div class=\"scene\" style=\"width: 688px; height: 380px;\">\n          <!-- card outline: 38 × 64 mm @ 4.2 px/mm = 160 × 269 -->\n          <div class=\"o\" style=\"left: 264px; top: 30px; width: 160px; height: 269px;\"><\u002Fdiv>\n          <!-- keepout 1.5 mm -->\n          <div class=\"o dashed\" style=\"left: 270px; top: 36px; width: 148px; height: 257px;\"><\u002Fdiv>\n          <div class=\"ann\" style=\"left: 436px; top: 42px;\">← EDGE KEEPOUT 1.5 (§3.7)<\u002Fdiv>\n\n          <!-- upper connector: center X=19, Y=60 -->\n          <div class=\"conn\" style=\"left: 312px; top: 41px; width: 64px; height: 11px;\"><i class=\"p1\"><\u002Fi><i><\u002Fi><i><\u002Fi><i><\u002Fi><i><\u002Fi><i><\u002Fi><\u002Fdiv>\n          <div class=\"ann\" style=\"left: 436px; top: 64px;\">← 1×6 · 2.54 PITCH · CTR (19, 60)<\u002Fdiv>\n          <!-- lower connector: center X=19, Y=4 -->\n          <div class=\"conn\" style=\"left: 312px; top: 277px; width: 64px; height: 11px;\"><i class=\"p1\"><\u002Fi><i><\u002Fi><i><\u002Fi><i><\u002Fi><i><\u002Fi><i><\u002Fi><\u002Fdiv>\n          <div class=\"ann\" style=\"left: 436px; top: 280px;\">← 1×6 · 2.54 PITCH · CTR (19, 4)<\u002Fdiv>\n          <div class=\"ann\" style=\"left: 264px; top: 308px;\">PIN 1 LEFTMOST ↑<\u002Fdiv>\n\n          <!-- X position dim: card left edge → connector center -->\n          <div class=\"dim-h above\" style=\"left: 264px; top: 22px; width: 80px;\"><span>19.0<\u002Fspan><\u002Fdiv>\n          <!-- connector spacing 56.0 -->\n          <div class=\"dim-v westside\" style=\"left: 248px; top: 47px; height: 235px;\"><span>56.0<\u002Fspan><\u002Fdiv>\n          <!-- card height -->\n          <div class=\"dim-v\" style=\"left: 510px; top: 30px; height: 269px;\"><span>64.0<\u002Fspan><\u002Fdiv>\n          <!-- card width -->\n          <div class=\"dim-h\" style=\"left: 264px; top: 330px; width: 160px;\"><span>38.0 ±0.2<\u002Fspan><\u002Fdiv>\n\n          <!-- origin axes (§3.6) -->\n          <div class=\"axis x\" style=\"left: 264px; top: 299px; width: 56px;\"><span>X<\u002Fspan><\u002Fdiv>\n          <div class=\"axis y\" style=\"left: 264px; top: 243px; height: 56px;\"><span>Y<\u002Fspan><\u002Fdiv>\n          <div class=\"ann\" style=\"left: 196px; top: 304px;\">ORIGIN (0,0)<\u002Fdiv>\n        <\u002Fdiv>\n        <figcaption><span>FIG 2 — BUDDY CARD, FRONT VIEW · CONNECTOR CENTERS PER §4.2 · ORIGIN AT LOWER-LEFT PER §3.6<\u002Fspan><span>SCALE 4.2 PX/MM<\u002Fspan><\u002Ffigcaption>\n      <\u002Ffigure>\n\n      <h3><span class=\"snum\">3.5<\u002Fspan>Inter-card spacing<\u002Fh3>\n      <p>Buddy Cards are installed on a 39 mm pitch. This results in a nominal 1 mm gap between adjacent cards.<\u002Fp>\n    <\u002Fsection>\n\n    <div class=\"page-foot\">\n      <div class=\"rails\"><\u002Fdiv>\n      <div class=\"folio\"><span>§3 · MECHANICAL SPECIFICATION<\u002Fspan><span>3 / 7<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ================= PAGE 4 ================= -->\n  <div class=\"page\" data-screen-label=\"Spec p.4 — Clearance &amp; Bus Mechanical\">\n    <div class=\"page-head\">\n      <span>BS-SPEC-100 · TECHNICAL SPECIFICATION<\u002Fspan>\n      <span class=\"ruler-run\"><span>90<\u002Fspan><span>95<\u002Fspan><span>100<\u002Fspan><span>105<\u002Fspan><span>110<\u002Fspan><span>115<\u002Fspan><\u002Fspan>\n      <span>V1.0 DRAFT<\u002Fspan>\n    <\u002Fdiv>\n\n    <section class=\"s\">\n      <h3><span class=\"snum\">3.6<\u002Fspan>Coordinate system<\u002Fh3>\n      <p>Buddy Card layouts shall use an origin at the lower-left corner, with units in millimeters. See FIG 2.<\u002Fp>\n\n      <h3><span class=\"snum\">3.7<\u002Fspan>Edge keepout<\u002Fh3>\n      <p>A minimum keepout of 1.5 mm shall be maintained from all card edges for component placement.<\u002Fp>\n\n      <h3><span class=\"snum\">3.8<\u002Fspan>Component clearance<\u002Fh3>\n      <p>Components may extend any distance above the PCB provided they do not interfere with adjacent cards or exceed the Buddy Base mechanical envelope. Components on the rear side of the PCB shall not extend more than 8 mm below the PCB surface.<\u002Fp>\n\n      <figure class=\"draw\">\n        <div class=\"scene sideview\" style=\"width: 688px;\">\n          <div class=\"comp-top\"><\u002Fdiv>\n          <div class=\"ann\" style=\"left: 352px; top: 46px;\">← FRONT COMPONENTS: NO LIMIT WITHIN ENVELOPE (§3.8)<\u002Fdiv>\n          <div class=\"pcb\"><\u002Fdiv>\n          <div class=\"ann\" style=\"left: 490px; top: 88px;\">PCB · 1.6 THK<\u002Fdiv>\n          <div class=\"comp-bot\"><\u002Fdiv>\n          <div class=\"ann\" style=\"left: 140px; top: 112px;\">REAR COMPONENTS →<\u002Fdiv>\n          <div class=\"dim-v\" style=\"left: 404px; top: 99px; height: 34px;\"><span>8.0 MAX<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <figcaption><span>FIG 3 — BUDDY CARD, SIDE VIEW · REAR CLEARANCE LIMIT PER §3.8<\u002Fspan><span>NOT TO SCALE<\u002Fspan><\u002Ffigcaption>\n      <\u002Ffigure>\n    <\u002Fsection>\n\n    <section class=\"s\">\n      <header class=\"s-head\">\n        <span class=\"plate\"><span class=\"cell fill\"><span>4<\u002Fspan><\u002Fspan><span class=\"cell\">BUS · MECHANICAL<\u002Fspan><\u002Fspan>\n        <span class=\"tag\">NORMATIVE<\u002Fspan>\n      <\u002Fheader>\n\n      <h3><span class=\"snum\">4.1<\u002Fspan>Connector type<\u002Fh3>\n      <p>The Buddy Bus consists of two 1×6 connectors using 2.54 mm (0.1 inch) pitch. Connectors face the front of the system and provide both electrical interconnection and mechanical retention.<\u002Fp>\n      <table class=\"spec half\">\n        <thead><tr><th>Location<\u002Fth><th>Connector<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td>Buddy Base<\u002Ftd><td class=\"v\">FEMALE<\u002Ftd><\u002Ftr>\n          <tr><td>Buddy Card<\u002Ftd><td class=\"v\">MALE<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n\n      <h3><span class=\"snum\">4.2<\u002Fspan>Connector placement<\u002Fh3>\n      <p>Connector centers shall be located as follows, with 56 mm center-to-center spacing. See FIG 2.<\u002Fp>\n      <table class=\"spec half\">\n        <thead><tr><th>Connector<\u002Fth><th>X<\u002Fth><th>Y<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td>Lower<\u002Ftd><td class=\"v\">19<\u002Ftd><td class=\"v\">4<\u002Ftd><\u002Ftr>\n          <tr><td>Upper<\u002Ftd><td class=\"v\">19<\u002Ftd><td class=\"v\">60<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fsection>\n\n    <div class=\"page-foot\">\n      <div class=\"rails\"><\u002Fdiv>\n      <div class=\"folio\"><span>§3–4 · MECHANICAL + BUS INTERFACE<\u002Fspan><span>4 / 7<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ================= PAGE 5 ================= -->\n  <div class=\"page\" data-screen-label=\"Spec p.5 — Bus Electrical\">\n    <div class=\"page-head\">\n      <span>BS-SPEC-100 · TECHNICAL SPECIFICATION<\u002Fspan>\n      <span class=\"ruler-run\"><span>120<\u002Fspan><span>125<\u002Fspan><span>130<\u002Fspan><span>135<\u002Fspan><span>140<\u002Fspan><span>145<\u002Fspan><\u002Fspan>\n      <span>V1.0 DRAFT<\u002Fspan>\n    <\u002Fdiv>\n\n    <section class=\"s\">\n      <header class=\"s-head\">\n        <span class=\"plate\"><span class=\"cell fill\"><span>5<\u002Fspan><\u002Fspan><span class=\"cell\">BUS · ELECTRICAL<\u002Fspan><\u002Fspan>\n        <span class=\"tag\">NORMATIVE<\u002Fspan>\n      <\u002Fheader>\n\n      <h3><span class=\"snum\">5.1<\u002Fspan>Pinout<\u002Fh3>\n      <p>When viewed from the front of a Buddy Card, pin 1 shall be the leftmost pin.<\u002Fp>\n\n      <figure class=\"draw\">\n        <div class=\"pinrow\">\n          <div class=\"pincell first\">\n            <div class=\"pad\">1<\u002Fdiv>\n            <span class=\"signal\">AUX<\u002Fspan>\n            <span class=\"chip\" style=\"--fam: var(--copper);\">RESERVED<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"pincell\">\n            <div class=\"pad\">2<\u002Fdiv>\n            <span class=\"signal\">BUS A<\u002Fspan>\n            <span class=\"chip\" style=\"--fam: var(--fam-dat);\">RS-485 A<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"pincell\">\n            <div class=\"pad\">3<\u002Fdiv>\n            <span class=\"signal\">BUS B<\u002Fspan>\n            <span class=\"chip\" style=\"--fam: var(--fam-dat);\">RS-485 B<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"pincell\">\n            <div class=\"pad\">4<\u002Fdiv>\n            <span class=\"signal\">3V3<\u002Fspan>\n            <span class=\"chip\" style=\"--fam: var(--fam-pwr);\">+3.3 V<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"pincell\">\n            <div class=\"pad\">5<\u002Fdiv>\n            <span class=\"signal\">5V<\u002Fspan>\n            <span class=\"chip\" style=\"--fam: var(--fam-pwr);\">+5 V<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"pincell\">\n            <div class=\"pad\">6<\u002Fdiv>\n            <span class=\"signal\">GND<\u002Fspan>\n            <span class=\"chip\" style=\"--fam: var(--rail-neg);\">GROUND<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <figcaption><span>FIG 4 — BUDDY BUS PINOUT · VIEWED FROM FRONT OF CARD · PIN 1 LEFTMOST<\u002Fspan><span>BOTH CONNECTORS IDENTICAL<\u002Fspan><\u002Ffigcaption>\n      <\u002Ffigure>\n\n      <h3><span class=\"snum\">5.2<\u002Fspan>Power rails<\u002Fh3>\n      <table class=\"spec half\">\n        <thead><tr><th>Rail<\u002Fth><th>Description<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td class=\"v\">3V3<\u002Ftd><td>Regulated 3.3 V supply<\u002Ftd><\u002Ftr>\n          <tr><td class=\"v\">5V<\u002Ftd><td>Main system supply<\u002Ftd><\u002Ftr>\n          <tr><td class=\"v\">GND<\u002Ftd><td>Common ground<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n      <p>Buddy Cards may generate additional voltages locally as required. Additional voltages are outside the scope of this specification.<\u002Fp>\n\n      <h3><span class=\"snum\">5.3<\u002Fspan>Power sources<\u002Fh3>\n      <p>The Buddy Base shall accept a 5 V input source. Supported input methods include USB-C and a 2-pin 0.1 inch header. The Buddy Base shall generate the system 3.3 V rail locally.<\u002Fp>\n\n      <h3><span class=\"snum\">5.4<\u002Fspan>Grounding<\u002Fh3>\n      <p>All Buddy Cards share a common ground plane through the Buddy Bus.<\u002Fp>\n    <\u002Fsection>\n\n    <div class=\"page-foot\">\n      <div class=\"rails\"><\u002Fdiv>\n      <div class=\"folio\"><span>§5 · BUS ELECTRICAL INTERFACE<\u002Fspan><span>5 / 7<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ================= PAGE 6 ================= -->\n  <div class=\"page\" data-screen-label=\"Spec p.6 — Communications\">\n    <div class=\"page-head\">\n      <span>BS-SPEC-100 · TECHNICAL SPECIFICATION<\u002Fspan>\n      <span class=\"ruler-run\"><span>150<\u002Fspan><span>155<\u002Fspan><span>160<\u002Fspan><span>165<\u002Fspan><span>170<\u002Fspan><span>175<\u002Fspan><\u002Fspan>\n      <span>V1.0 DRAFT<\u002Fspan>\n    <\u002Fdiv>\n\n    <section class=\"s\">\n      <header class=\"s-head\">\n        <span class=\"plate\"><span class=\"cell fill\"><span>6<\u002Fspan><\u002Fspan><span class=\"cell\">BUS · COMMS<\u002Fspan><\u002Fspan>\n        <span class=\"tag\">NORMATIVE<\u002Fspan>\n      <\u002Fheader>\n\n      <h3><span class=\"snum\">6.1<\u002Fspan>Physical layer<\u002Fh3>\n      <p>BUS A and BUS B form a shared multidrop RS-485 communication bus. All Buddy Card slots are connected in parallel.<\u002Fp>\n\n      <figure class=\"draw\">\n        <div class=\"scene topo\" style=\"width: 688px;\">\n          <div class=\"slotbox\" style=\"left: 64px;\"><span class=\"sn\">SLOT 1<\u002Fspan><span class=\"sl\">PARALLEL<\u002Fspan><\u002Fdiv>\n          <div class=\"slotbox\" style=\"left: 159px;\"><span class=\"sn\">SLOT 2<\u002Fspan><span class=\"sl\">PARALLEL<\u002Fspan><\u002Fdiv>\n          <div class=\"slotbox\" style=\"left: 254px;\"><span class=\"sn\">SLOT 3<\u002Fspan><span class=\"sl\">PARALLEL<\u002Fspan><\u002Fdiv>\n          <div class=\"slotbox\" style=\"left: 349px;\"><span class=\"sn\">SLOT 4<\u002Fspan><span class=\"sl\">PARALLEL<\u002Fspan><\u002Fdiv>\n          <div class=\"slotbox\" style=\"left: 444px;\"><span class=\"sn\">SLOT 5<\u002Fspan><span class=\"sl\">PARALLEL<\u002Fspan><\u002Fdiv>\n          <div class=\"slotbox\" style=\"left: 539px;\"><span class=\"sn\">SLOT 6<\u002Fspan><span class=\"sl\">PARALLEL<\u002Fspan><\u002Fdiv>\n\n          <!-- stubs: A tap + B tap per slot -->\n          <div class=\"stub\" style=\"left: 94px;  top: 82px; height: 68px;\"><\u002Fdiv><div class=\"stub\" style=\"left: 120px; top: 82px; height: 98px;\"><\u002Fdiv>\n          <div class=\"stub\" style=\"left: 189px; top: 82px; height: 68px;\"><\u002Fdiv><div class=\"stub\" style=\"left: 215px; top: 82px; height: 98px;\"><\u002Fdiv>\n          <div class=\"stub\" style=\"left: 284px; top: 82px; height: 68px;\"><\u002Fdiv><div class=\"stub\" style=\"left: 310px; top: 82px; height: 98px;\"><\u002Fdiv>\n          <div class=\"stub\" style=\"left: 379px; top: 82px; height: 68px;\"><\u002Fdiv><div class=\"stub\" style=\"left: 405px; top: 82px; height: 98px;\"><\u002Fdiv>\n          <div class=\"stub\" style=\"left: 474px; top: 82px; height: 68px;\"><\u002Fdiv><div class=\"stub\" style=\"left: 500px; top: 82px; height: 98px;\"><\u002Fdiv>\n          <div class=\"stub\" style=\"left: 569px; top: 82px; height: 68px;\"><\u002Fdiv><div class=\"stub\" style=\"left: 595px; top: 82px; height: 98px;\"><\u002Fdiv>\n\n          <div class=\"busline\" style=\"top: 150px;\"><\u002Fdiv>\n          <div class=\"busline\" style=\"top: 180px;\"><\u002Fdiv>\n          <span class=\"buslabel\" style=\"right: 24px; top: 136px;\">BUS A<\u002Fspan>\n          <span class=\"buslabel\" style=\"right: 24px; top: 186px;\">BUS B<\u002Fspan>\n\n          <div class=\"term\" style=\"left: 2px; top: 144px;\">TERM<br>(BASE)<\u002Fdiv>\n          <div class=\"term\" style=\"right: 2px; top: 144px; left: auto;\">TERM<br>(BASE)<\u002Fdiv>\n        <\u002Fdiv>\n        <figcaption><span>FIG 5 — RS-485 MULTIDROP TOPOLOGY · TERMINATION AT BASE ONLY PER §6.2<\u002Fspan><span>SCHEMATIC, NOT TO SCALE<\u002Fspan><\u002Ffigcaption>\n      <\u002Ffigure>\n\n      <h3><span class=\"snum\">6.2<\u002Fspan>Bus termination<\u002Fh3>\n      <p>Bus termination shall be provided by the Buddy Base. Buddy Cards shall not provide bus termination.<\u002Fp>\n\n      <h3><span class=\"snum\">6.3<\u002Fspan>AUX signal<\u002Fh3>\n      <p>The AUX signal is reserved for future use. No behavior is currently defined by this specification.<\u002Fp>\n\n      <h3><span class=\"snum\">6.4<\u002Fspan>Protocol layer<\u002Fh3>\n      <p>The following topics are intentionally undefined: message format, addressing, module discovery, synchronization, device identity, and transport protocol. These concerns are protocol-level decisions and are outside the scope of this specification.<\u002Fp>\n      <div class=\"callout\" style=\"--fam: var(--fam-dat);\">\n        <span class=\"chip\" style=\"--fam: var(--fam-dat);\">SEE<\u002Fspan>\n        <p>The protocol layer is defined separately in <a href=\"Buddy Bus Protocol Spec.html\" style=\"color: inherit; font-weight: 600;\">BS-SPEC-200 · Buddy Bus Protocol v1<\u002Fa>.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <div class=\"page-foot\">\n      <div class=\"rails\"><\u002Fdiv>\n      <div class=\"folio\"><span>§6 · BUS COMMUNICATIONS<\u002Fspan><span>6 / 7<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ================= PAGE 7 ================= -->\n  <div class=\"page\" data-screen-label=\"Spec p.7 — Protection &amp; Future\">\n    <div class=\"page-head\">\n      <span>BS-SPEC-100 · TECHNICAL SPECIFICATION<\u002Fspan>\n      <span class=\"ruler-run\"><span>180<\u002Fspan><span>185<\u002Fspan><span>190<\u002Fspan><span>195<\u002Fspan><span>200<\u002Fspan><span>205<\u002Fspan><\u002Fspan>\n      <span>V1.0 DRAFT<\u002Fspan>\n    <\u002Fdiv>\n\n    <section class=\"s\">\n      <header class=\"s-head\">\n        <span class=\"plate\"><span class=\"cell fill\"><span>7<\u002Fspan><\u002Fspan><span class=\"cell\">PROTECTION<\u002Fspan><\u002Fspan>\n        <span class=\"tag\">NORMATIVE<\u002Fspan>\n      <\u002Fheader>\n      <p>The Buddy Base shall provide over-current protection for the standard power rails. Implementation details are outside the scope of this specification.<\u002Fp>\n    <\u002Fsection>\n\n    <section class=\"s\">\n      <header class=\"s-head\">\n        <span class=\"plate\"><span class=\"cell fill\"><span>8<\u002Fspan><\u002Fspan><span class=\"cell\">HOT-PLUGGING<\u002Fspan><\u002Fspan>\n        <span class=\"tag\">NORMATIVE<\u002Fspan>\n      <\u002Fheader>\n      <p>Hot-plugging of Buddy Cards is not supported.<\u002Fp>\n      <div class=\"callout\" style=\"--fam: var(--fam-pwr);\">\n        <span class=\"chip\" style=\"--fam: var(--fam-pwr);\">CAUTION<\u002Fspan>\n        <p>Buddy Cards shall only be inserted or removed while the Buddy Base is powered off.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section class=\"s\">\n      <header class=\"s-head\">\n        <span class=\"plate\"><span class=\"cell fill\"><span>9<\u002Fspan><\u002Fspan><span class=\"cell\">VISUAL DESIGN<\u002Fspan><\u002Fspan>\n        <span class=\"tag\">INFORMATIVE<\u002Fspan>\n      <\u002Fheader>\n      <p>This specification does not impose requirements regarding silkscreen placement, logos, labeling conventions, color schemes, or aesthetic design. Visual consistency is encouraged but not required for compliance.<\u002Fp>\n      <div class=\"callout\" style=\"--fam: var(--fam-uty);\">\n        <span class=\"chip\" style=\"--fam: var(--fam-uty);\">SEE<\u002Fspan>\n        <p>The recommended visual language — faceplate anatomy, family color coding, and silkscreen conventions — is defined separately in <a href=\"Buddy System Design System.html\" style=\"color: inherit; font-weight: 600;\">Buddy System Design System v0.1<\u002Fa>. Compliance with this specification is mechanical and electrical only.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section class=\"s\">\n      <header class=\"s-head\">\n        <span class=\"plate\"><span class=\"cell fill\"><span>10<\u002Fspan><\u002Fspan><span class=\"cell\">FUTURE<\u002Fspan><\u002Fspan>\n        <span class=\"tag\">INFORMATIVE<\u002Fspan>\n      <\u002Fheader>\n      <p>Future specifications may define: bus protocols, message formats, addressing schemes, module discovery, synchronization methods, current limits, hot-plug support, and additional power capabilities. These topics are intentionally left undefined in Version 1.0.<\u002Fp>\n\n      <h3>Revision history<\u002Fh3>\n      <table class=\"spec\">\n        <thead><tr><th>Rev<\u002Fth><th>Date<\u002Fth><th>Description<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td class=\"v\">1.0 DRAFT<\u002Ftd><td class=\"v\">JUN 2026<\u002Ftd><td>Initial public draft.<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fsection>\n\n    <div class=\"page-foot\">\n      <div class=\"rails\"><\u002Fdiv>\n      <div class=\"folio\"><span>END OF SPECIFICATION · MADE TO BE MODIFIED<\u002Fspan><span>7 / 7<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n\n<\u002Fbody><\u002Fhtml>"
